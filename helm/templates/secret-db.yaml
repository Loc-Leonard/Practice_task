apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secret.name }}
  namespace: {{ .Values.namespace }}
type: Opaque
stringData:
  POSTGRES_USER: "{{ .Values.secret.postgresUser }}"
  POSTGRES_PASSWORD: "{{ .Values.secret.postgresPassword }}"
  POSTGRES_DB: "{{ .Values.secret.postgresDb }}"

  DB_USER: "{{ .Values.secret.dbUser }}"
  DB_PASS: "{{ .Values.secret.dbPass }}"
  DB_NAME: "{{ .Values.secret.dbName }}"

  PGADMIN_DEFAULT_EMAIL: "{{ .Values.secret.pgadminEmail }}"
  PGADMIN_DEFAULT_PASSWORD: "{{ .Values.secret.pgadminPassword }}"
