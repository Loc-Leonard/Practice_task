apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.app.name }}
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.app.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.app.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.app.name }}
    spec:
      containers:
        - name: {{ .Values.app.name }}
          image: {{ .Values.app.image }}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: {{ .Values.app.containerPort }}
          env:
            - name: DB_HOST
              value: "{{ .Values.postgres.name }}"
          envFrom:
            - secretRef:
                name: {{ .Values.secret.name }}
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.app.containerPort }}
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.app.containerPort }}
            initialDelaySeconds: 15
            periodSeconds: 20
