version: '3.8'
services:
  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - 8080:8080
    env_file: 
      - .env  # ← из .env!
    networks: [backend-net]
    restart: unless-stopped

  postgres:
    image: postgres:16
    env_file:
      - .env  # ← из .env!
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user"]
      interval: 10s
      retries: 5
    networks: [backend-net]
    restart: unless-stopped

networks:
  backend-net:
    driver: bridge

volumes:
  pgdata:
