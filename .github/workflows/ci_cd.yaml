name: CI
on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]
jobs:
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Run Go tests
        run: go test ./... -v
    

  ui-test:
    needs: unit-test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: change_me_please
          POSTGRES_DB: surveydb
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U user"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm deps
        run: npm ci

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Start app
        env:
          DB_HOST: localhost
          DB_USER: user
          DB_PASS: change_me_please
          DB_NAME: surveydb
        run: |
          go build -o app .
          ./app &
          echo $! > app.pid
      - name: Wait for app
        run: |
          for i in {1..30}; do
            curl -fsS http://localhost:8080 && exit 0
            sleep 2
          done
          echo "App did not start in time"
          exit 1
      - name: Run Cypress tests
        run: npx cypress run
      
      - name: Stop app
        if: always()
        run: |
          if [ -f app.pid ]; then
            kill "$(cat app.pid)" || true
          fi